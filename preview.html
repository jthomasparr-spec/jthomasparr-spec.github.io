<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nearest Pharmacy Checker</title>

  <!-- Leaflet (map) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; }
    header { padding: 14px 16px; border-bottom: 1px solid #ddd; }
    .wrap { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 56px); }
    .panel { padding: 16px; border-right: 1px solid #eee; }
    .panel label { display: block; margin: 10px 0 6px; font-weight: 600; }
    .panel input, .panel button, .panel select { width: 100%; padding: 10px; font-size: 14px; }
    .panel button { cursor: pointer; margin-top: 10px; }
    #map { height: calc(100vh - 56px); }
    .status { margin-top: 10px; color: #444; font-size: 14px; }
    .results { margin-top: 14px; }
    .result-item { padding: 10px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; }
    .small { color: #666; font-size: 12px; margin-top: 6px; }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .panel { border-right: none; border-bottom: 1px solid #eee; }
      #map { height: 55vh; }
    }
  </style>
</head>

<body>
  <header>
    <strong>Nearest Pharmacy Checker</strong>
  </header>

  <div class="wrap">
    <div class="panel">
      <label for="address">Address</label>
      <input id="address" placeholder="e.g. 10 Downing Street, London" />

      <label for="radiusKm">Search radius (km)</label>
      <input id="radiusKm" type="number" min="0.5" step="0.5" value="5" />

      <label for="maxResults">Max results</label>
      <select id="maxResults">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
      </select>

      <button id="btnCheck">Find nearest pharmacies</button>
      <button id="btnUseLocation" type="button">Use my current location</button>

      <div class="status" id="status"></div>
      <div class="results" id="results"></div>

      <div class="small">
        Notes: This uses OpenStreetMap’s Nominatim + Overpass (public services). For heavy/production use,
        you should run your own proxy/server or use a paid geocoder.
      </div>
    </div>

    <div id="map"></div>
  </div>

<script>
  // --- Helpers ---
  const statusEl = document.getElementById('status');
  const resultsEl = document.getElementById('results');

  function setStatus(msg) { statusEl.textContent = msg; }

  // Haversine distance (meters)
  function distanceMeters(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = d => (d * Math.PI) / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat/2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function fmtDistance(m) {
    const km = m / 1000;
    const miles = m / 1609.344;
    return `${km.toFixed(2)} km (${miles.toFixed(2)} mi)`;
  }

  // --- Map setup ---
  const map = L.map('map').setView([51.505, -0.09], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let originMarker = null;
  let pharmacyLayer = L.layerGroup().addTo(map);

  function clearMap() {
    pharmacyLayer.clearLayers();
    if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
  }

  function addOrigin(lat, lon, label) {
    originMarker = L.marker([lat, lon]).addTo(map).bindPopup(label).openPopup();
    map.setView([lat, lon], 14);
  }

  // --- Geocoding: address -> lat/lon via Nominatim ---
  async function geocodeAddress(address) {
    // Using Nominatim public endpoint (light usage only)
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(address)}`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('Geocoding failed.');
    const data = await res.json();
    if (!data || data.length === 0) throw new Error('No match found for that address.');
    return {
      lat: parseFloat(data[0].lat),
      lon: parseFloat(data[0].lon),
      display: data[0].display_name
    };
  }

  // --- Overpass: find pharmacies around lat/lon within radius ---
  async function fetchPharmacies(lat, lon, radiusKm) {
    const radiusM = Math.round(radiusKm * 1000);

    const query = `
      [out:json][timeout:25];
      (
        node["amenity"="pharmacy"](around:${radiusM},${lat},${lon});
        way["amenity"="pharmacy"](around:${radiusM},${lat},${lon});
        relation["amenity"="pharmacy"](around:${radiusM},${lat},${lon});
      );
      out center tags;
    `;

    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
      body: query
    });

    if (!res.ok) throw new Error('Overpass query failed.');
    const json = await res.json();
    return json.elements || [];
  }

  function elementToLatLon(el) {
    if (el.type === 'node') return { lat: el.lat, lon: el.lon };
    if (el.center) return { lat: el.center.lat, lon: el.center.lon };
    return null;
  }

  function nameFor(el) {
    return (el.tags && (el.tags.name || el.tags['brand'])) || 'Pharmacy (no name listed)';
  }

  function addrFor(el) {
    const t = el.tags || {};
    const parts = [
      t['addr:housenumber'],
      t['addr:street'],
      t['addr:suburb'],
      t['addr:city'] || t['addr:town'] || t['addr:village'],
      t['addr:postcode']
    ].filter(Boolean);
    return parts.join(', ') || '';
  }

  function openInOSM(lat, lon) {
    return `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=18/${lat}/${lon}`;
  }

  async function runFromLatLon(lat, lon, originLabel) {
    const radiusKm = parseFloat(document.getElementById('radiusKm').value || '5');
    const maxResults = parseInt(document.getElementById('maxResults').value || '10', 10);

    clearMap();
    addOrigin(lat, lon, originLabel);

    setStatus('Searching for pharmacies…');
    resultsEl.innerHTML = '';

    const elements = await fetchPharmacies(lat, lon, radiusKm);

    const pharmacies = elements
      .map(el => {
        const p = elementToLatLon(el);
        if (!p) return null;
        const distM = distanceMeters(lat, lon, p.lat, p.lon);
        return {
          id: `${el.type}/${el.id}`,
          lat: p.lat,
          lon: p.lon,
          name: nameFor(el),
          address: addrFor(el),
          distanceM: distM
        };
      })
      .filter(Boolean)
      .sort((a, b) => a.distanceM - b.distanceM)
      .slice(0, maxResults);

    if (pharmacies.length === 0) {
      setStatus(`No pharmacies found within ${radiusKm} km.`);
      return;
    }

    setStatus(`Found ${pharmacies.length} pharmacies (showing nearest first).`);

    // Map markers + results list
    const bounds = L.latLngBounds([[lat, lon]]);
    pharmacies.forEach(ph => {
      const marker = L.marker([ph.lat, ph.lon]).addTo(pharmacyLayer);
      marker.bindPopup(
        `<strong>${ph.name}</strong><br>${ph.address ? ph.address + '<br>' : ''}${fmtDistance(ph.distanceM)}`
      );
      bounds.extend([ph.lat, ph.lon]);

      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `
        <div><strong>${ph.name}</strong></div>
        <div>${fmtDistance(ph.distanceM)}</div>
        ${ph.address ? `<div class="small">${ph.address}</div>` : ''}
        <div class="small"><a href="${openInOSM(ph.lat, ph.lon)}" target="_blank" rel="noopener">Open in OpenStreetMap</a></div>
      `;
      resultsEl.appendChild(div);
    });

    map.fitBounds(bounds.pad(0.25));
  }

  // --- UI actions ---
  document.getElementById('btnCheck').addEventListener('click', async () => {
    try {
      const address = document.getElementById('address').value.trim();
      if (!address) {
        setStatus('Type an address first.');
        return;
      }
      setStatus('Finding that address…');
      const g = await geocodeAddress(address);
      await runFromLatLon(g.lat, g.lon, `Address: ${g.display}`);
    } catch (err) {
      setStatus(err.message || 'Something went wrong.');
      console.error(err);
    }
  });

  document.getElementById('btnUseLocation').addEventListener('click', () => {
    if (!navigator.geolocation) {
      setStatus('Geolocation is not supported in this browser.');
      return;
    }
    setStatus('Getting your location…');
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          await runFromLatLon(lat, lon, 'Your location');
        } catch (err) {
          setStatus(err.message || 'Something went wrong.');
        }
      },
      (err) => setStatus('Location permission denied or unavailable.')
    );
  });
</script>
</body>
</html>
